<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task 2</title>
    <link rel="stylesheet" href="style2.css" />
  </head>
  <body>
    <nav>
      <h2>Task 2 Project</h2>

      <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">Form</a></li>
        <li><a href="#">Todo</a></li>
      </ul>
    </nav>

    <div class="container">
      <div class="center">
        <h1>Contact Form</h1>

        <form id="form">
          <div class="div">
            <p>Enter Name:</p>
            <input type="text" id="name" placeholder="Enter Name" />
          </div>

          <div class="div">
            <p>Enter Email:</p>
            <input type="email" id="email" placeholder="Enter Email" />
          </div>

          <div class="div">
            <p>Message:</p>
            <textarea id="message" placeholder="Enter Message"></textarea>
          </div>

          <button type="submit" id="btn">Submit</button>
        </form>
      </div>

      <div class="center">
        <h1>TO DO LIST</h1>

        <div class="div1">
          <input type="text" id="task" placeholder="Add Task" />

          <button id="addbtn">Add Task</button>
        </div>

        <div class="div2">
          <ul id="ul"></ul>
        </div>
      </div>
    </div>

    <footer>
      <p>Made by tanuraj</p>
    </footer>

    <script src="script2.js"></script>
  </body>
</html>
